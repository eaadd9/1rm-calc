<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1RM Calculator</title>
<meta name="theme-color" content="#0a0a0a">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --border: #2a2a2a;
  --accent: #ffffff;
  --accent2: #888888;
  --text: #f0f0f0;
  --muted: #555;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.container {
  width: 100%;
  max-width: 480px;
}

header {
  margin-bottom: 40px;
}

.label-tag {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 11px;
  letter-spacing: 4px;
  color: var(--accent);
  border: 1px solid var(--accent);
  display: inline-block;
  padding: 2px 10px;
  margin-bottom: 12px;
}

h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(48px, 10vw, 72px);
  line-height: 0.9;
  letter-spacing: 2px;
  color: var(--text);
}

.subtitle {
  font-size: 12px;
  color: var(--muted);
  margin-top: 10px;
  letter-spacing: 1px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 32px;
  margin-bottom: 16px;
}

.field {
  margin-bottom: 24px;
}

.field:last-child {
  margin-bottom: 0;
}

.field label {
  display: block;
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 10px;
}

.slider-row {
  display: flex;
  align-items: center;
  gap: 16px;
}

input[type="range"] {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 2px;
  outline: none;
  cursor: pointer;
  border-radius: 0;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  background: var(--accent);
  cursor: pointer;
  border: none;
}

.weight-input {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px;
  color: var(--accent);
  width: 80px;
  text-align: right;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  outline: none;
  padding: 2px 0;
  -moz-appearance: textfield;
  transition: border-color 0.15s;
}

.weight-input:focus {
  border-bottom-color: var(--accent);
}

.weight-input::-webkit-outer-spin-button,
.weight-input::-webkit-inner-spin-button {
  -webkit-appearance: none;
}

.range-labels {
  display: flex;
  justify-content: space-between;
  margin-top: 6px;
  font-size: 10px;
  color: var(--muted);
}

.weight-btn-row {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}

.w-btn {
  flex: 1;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px;
  letter-spacing: 1px;
  padding: 10px 0;
  cursor: pointer;
  transition: background 0.1s, color 0.1s, border-color 0.1s;
}

.w-btn:hover {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
}

.num-input-wrap {
  display: flex;
  align-items: center;
  border: 1px solid var(--border);
  overflow: hidden;
}

.num-btn {
  background: transparent;
  border: none;
  color: var(--muted);
  font-size: 22px;
  width: 52px;
  height: 52px;
  cursor: pointer;
  transition: background 0.1s, color 0.1s;
}

.num-btn:hover {
  background: var(--accent);
  color: #000;
}

.num-input-wrap input[type="number"] {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px;
  text-align: center;
  outline: none;
  padding: 8px 0;
  -moz-appearance: textfield;
}

.num-input-wrap input[type="number"]::-webkit-outer-spin-button,
.num-input-wrap input[type="number"]::-webkit-inner-spin-button {
  -webkit-appearance: none;
}

.result-card {
  background: linear-gradient(135deg, #1a1a1a, #111);
  border: 1px solid var(--accent);
  padding: 32px;
  text-align: center;
  position: relative;
  overflow: hidden;
  margin-bottom: 16px;
}

.result-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, rgba(255,255,255,0.04) 0%, transparent 70%);
  pointer-events: none;
}

.result-label {
  font-size: 11px;
  letter-spacing: 4px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 8px;
}

.result-value {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 88px;
  line-height: 1;
  color: var(--accent);
  transition: all 0.2s;
}

.result-unit {
  font-size: 14px;
  color: var(--muted);
  letter-spacing: 2px;
  margin-top: 4px;
}

.input-summary {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  color: var(--text);
  letter-spacing: 2px;
  margin-top: 12px;
  opacity: 0.85;
}

.formula-note {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 1px;
  margin-top: 8px;
  opacity: 0.6;
}

.rep-table {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
}

.rep-cell {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 10px 4px;
  text-align: center;
}

.rc-reps {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  color: var(--text);
  display: block;
  margin-bottom: 2px;
}

.rc-pct {
  color: var(--accent2);
  font-size: 10px;
  display: block;
  margin-bottom: 2px;
}

.rc-kg {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  color: var(--text);
  display: block;
}

@keyframes pop {
  from { transform: scale(0.92); opacity: 0.5; }
  to   { transform: scale(1);    opacity: 1; }
}

.animate-in {
  animation: pop 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
}
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="label-tag">STRENGTH TOOL</div>
    <h1>1RM<br>CALC</h1>
    <p class="subtitle">最大挙上重量 推定計算機</p>
  </header>

  <div class="card">
    <div class="field">
      <label>重量 / kg</label>
      <div class="slider-row">
        <input type="range" id="weightSlider" min="20" max="200" value="60" step="2.5">
        <input type="number" class="weight-input" id="weightVal" value="60" min="20" max="200" step="2.5">
      </div>
      <div class="range-labels">
        <span>20</span><span>200</span>
      </div>
      <div class="weight-btn-row">
        <button class="w-btn" id="wMinus5">− 5</button>
        <button class="w-btn" id="wMinus">− 2.5</button>
        <button class="w-btn" id="wPlus">＋ 2.5</button>
        <button class="w-btn" id="wPlus5">＋ 5</button>
      </div>
    </div>

    <div class="field">
      <label>レップ数</label>
      <div class="num-input-wrap">
        <button class="num-btn" id="repMinus">−</button>
        <input type="number" id="repInput" value="5" min="1" max="30">
        <button class="num-btn" id="repPlus">＋</button>
      </div>
    </div>
  </div>

  <div class="result-card">
    <div class="result-label">推定 1RM</div>
    <div class="result-value" id="resultVal">—</div>
    <div class="result-unit">kg</div>
    <div class="input-summary" id="inputSummary">— kg × — rep</div>
    <div class="formula-note" id="formulaNote">Epley式: weight × (1 + reps/30)</div>
  </div>

  <div class="rep-table" id="repTable"></div>

</div>

<script>
const weightSlider = document.getElementById('weightSlider');
const weightVal    = document.getElementById('weightVal');
const repInput     = document.getElementById('repInput');
const resultVal    = document.getElementById('resultVal');
const inputSummary = document.getElementById('inputSummary');
const formulaNote  = document.getElementById('formulaNote');
const repTable     = document.getElementById('repTable');

function syncSlider(v) {
  const pct = (v - 20) / (200 - 20) * 100;
  weightSlider.style.background =
    'linear-gradient(to right, #fff ' + pct + '%, #2a2a2a ' + pct + '%)';
}

function setWeight(v) {
  v = Math.min(200, Math.max(20, Math.round(v * 10) / 10));
  weightVal.value = v;
  weightSlider.value = v;
  syncSlider(v);
  calculate();
}

weightSlider.addEventListener('input', function() {
  setWeight(parseFloat(this.value));
});

weightVal.addEventListener('change', function() {
  setWeight(parseFloat(this.value) || 60);
});

weightVal.addEventListener('input', function() {
  var v = parseFloat(this.value);
  if (!isNaN(v)) {
    weightSlider.value = Math.min(200, Math.max(20, v));
    syncSlider(Math.min(200, Math.max(20, v)));
    calculate();
  }
});

document.getElementById('wMinus5').addEventListener('click', function() {
  setWeight(parseFloat(weightVal.value) - 5);
});

document.getElementById('wPlus5').addEventListener('click', function() {
  setWeight(parseFloat(weightVal.value) + 5);
});

document.getElementById('wMinus').addEventListener('click', function() {
  setWeight(parseFloat(weightVal.value) - 2.5);
});

document.getElementById('wPlus').addEventListener('click', function() {
  setWeight(parseFloat(weightVal.value) + 2.5);
});

document.getElementById('repMinus').addEventListener('click', function() {
  var v = parseInt(repInput.value);
  if (v > 1) { repInput.value = v - 1; calculate(); }
});

document.getElementById('repPlus').addEventListener('click', function() {
  var v = parseInt(repInput.value);
  if (v < 30) { repInput.value = v + 1; calculate(); }
});

repInput.addEventListener('input', calculate);

function calculate() {
  var w = parseFloat(weightVal.value) || 60;
  var r = parseInt(repInput.value) || 1;
  var orm = r === 1 ? w : w * (1 + r / 30);
  orm = Math.round(orm * 2) / 2;

  resultVal.textContent    = orm.toFixed(1);
  inputSummary.textContent = w + 'kg × ' + r + 'rep';
  formulaNote.textContent  = r === 1
    ? '実測値'
    : 'Epley式: ' + w + 'kg × (1 + ' + r + '/30)';

  resultVal.classList.remove('animate-in');
  void resultVal.offsetWidth;
  resultVal.classList.add('animate-in');

  var pcts = [
    {reps:1,pct:100},{reps:2,pct:95},{reps:3,pct:90},
    {reps:5,pct:85},{reps:6,pct:82.5},{reps:8,pct:77.5},
    {reps:10,pct:72.5},{reps:12,pct:67.5},{reps:15,pct:62.5},{reps:20,pct:55}
  ];

  repTable.innerHTML = pcts.map(function(p) {
    var kg = (Math.round(orm * p.pct / 100 * 2) / 2).toFixed(1);
    return '<div class="rep-cell">'
      + '<span class="rc-reps">' + p.reps + 'RM</span>'
      + '<span class="rc-pct">' + p.pct + '%</span>'
      + '<span class="rc-kg">' + kg + 'kg</span>'
      + '</div>';
  }).join('');
}

syncSlider(60);
calculate();
</script>
</body>
</html>
